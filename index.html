<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Jogos da Medicina</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ffd6e7,#ffffff,#ffeaf5);
text-align:center;
margin:0;
}

/* HEADER */

header{
background:#ff5fa2;
color:white;
padding:30px;
font-size:35px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* INTRO */

.intro{
padding:40px;
}

.intro h1{
font-size:40px;
color:#ff2e8c;
}

.intro p{
font-size:18px;
color:#555;
max-width:600px;
margin:auto;
margin-top:10px;
}

/* BOTÕES */

.menu{
margin-top:40px;
}

button{
padding:15px 25px;
margin:10px;
border:none;
border-radius:12px;
background:#ff4fa3;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
background:#ff2e8c;
}

/* CARDS */

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0px 5px 20px rgba(0,0,0,0.2);
max-width:600px;
margin:auto;
margin-top:30px;
}

/* ICONE */

.icon{
font-size:60px;
margin-top:20px;
}

/* ESCONDER */

.hidden{
display:none;
}

</style>

</head>

<body>

<header>
🩺 Mini Jogos da Medicina
</header>

<div class="intro">

<div class="icon">🧬🫀🏥</div>

<h1>Treine como uma médica!</h1>

<p>
Bem-vinda ao hospital virtual. Teste seus conhecimentos com
jogos de medicina, anatomia e atendimento de pacientes.
</p>

<div class="menu">

<button onclick="startQuizMed()">🧠 Quiz de Medicina</button>

<button onclick="startQuizAna()">🦴 Quiz de Anatomia</button>

<button onclick="startPaciente()">🚑 Salvar o Paciente</button>

</div>

</div>

<div id="game" class="card hidden"></div>

    <script>

let perguntas=[]
let atual=0
let pontos=0

function mostrarPergunta(){

let p=perguntas[atual]

let html=`<h2>${p.pergunta}</h2>`

p.opcoes.forEach(op=>{
html+=`<button onclick="responder('${op}')">${op}</button>`
})

document.getElementById("game").innerHTML=html
}

function responder(op){

if(op==perguntas[atual].correta){
pontos++
}

atual++

if(atual<perguntas.length){

mostrarPergunta()

}else{

document.getElementById("game").innerHTML=
`<h2>Resultado</h2>
<p>Você acertou ${pontos} de ${perguntas.length}</p>
<button onclick="location.reload()">Jogar novamente</button>`
}

}

function startQuizMed(){

perguntas=[

{
pergunta:"Qual órgão bombeia sangue?",
opcoes:["Pulmão","Coração","Fígado"],
correta:"Coração"
},

{
pergunta:"Qual vitamina vem do sol?",
opcoes:["Vitamina C","Vitamina D","Vitamina A"],
correta:"Vitamina D"
},

{
pergunta:"Qual profissional realiza cirurgias?",
opcoes:["Enfermeiro","Cirurgião","Nutricionista"],
correta:"Cirurgião"
},

{
pergunta:"Qual exame vê os ossos?",
opcoes:["Raio X","Ultrassom","Termômetro"],
correta:"Raio X"
},

{
pergunta:"Qual órgão filtra o sangue?",
opcoes:["Rim","Pulmão","Baço"],
correta:"Rim"
},

{
pergunta:"Qual parte do sangue transporta oxigênio?",
opcoes:["Hemácias","Plaquetas","Plasma"],
correta:"Hemácias"
}

]

iniciar()

}

function startQuizAna(){

perguntas=[

{
pergunta:"Quantos ossos tem o corpo adulto?",
opcoes:["180","206","250"],
correta:"206"
},

{
pergunta:"Qual é o maior órgão do corpo?",
opcoes:["Coração","Pele","Pulmão"],
correta:"Pele"
},

{
pergunta:"Qual osso protege o cérebro?",
opcoes:["Crânio","Fêmur","Costela"],
correta:"Crânio"
},

{
pergunta:"Qual músculo bombeia sangue?",
opcoes:["Coração","Bíceps","Trapézio"],
correta:"Coração"
},

{
pergunta:"Onde fica o fêmur?",
opcoes:["Braço","Perna","Cabeça"],
correta:"Perna"
},

{
pergunta:"Qual órgão ajuda na respiração?",
opcoes:["Pulmão","Estômago","Rim"],
correta:"Pulmão"
}

]

iniciar()

}

function startPaciente(){

perguntas=[

{
pergunta:"Paciente em parada cardíaca. O que fazer?",
opcoes:["Massagem cardíaca","Dar água","Esperar"],
correta:"Massagem cardíaca"
},

{
pergunta:"Paciente sem respirar. Qual ação?",
opcoes:["RCP","Tirar foto","Dar comida"],
correta:"RCP"
},

{
pergunta:"Coração parou. O que usar?",
opcoes:["Desfibrilador","Termômetro","Estetoscópio"],
correta:"Desfibrilador"
},

{
pergunta:"Paciente com febre alta. O que medir?",
opcoes:["Temperatura","Altura","Peso"],
correta:"Temperatura"
},

{
pergunta:"Paciente desmaiou. Primeiro passo?",
opcoes:["Verificar pulso","Ir embora","Dormir"],
correta:"Verificar pulso"
},

{
pergunta:"Paciente sangrando. O que fazer?",
opcoes:["Pressionar ferida","Ignorar","Dar água"],
correta:"Pressionar ferida"
}

]

iniciar()

}

function iniciar(){

atual=0
pontos=0

document.getElementById("game").classList.remove("hidden")

mostrarPergunta()

}

</script>

</body>
</html>
